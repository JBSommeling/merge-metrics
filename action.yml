name: 'MergeMetrics Dashboard'
description: 'Automated repository health analysis — PR bottlenecks, reviewer load, bus factor, release frequency, and a composite health score delivered as a static dashboard.'
branding:
  icon: 'activity'
  color: 'blue'

inputs:
  token:
    description: 'GitHub token for API access'
    required: false
    default: ${{ github.token }}
  config:
    description: 'Path to .mergemetrics.yml config file'
    required: false
    default: '.mergemetrics.yml'
  output-dir:
    description: 'Output directory for dashboard files'
    required: false
    default: 'docs'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - 'generate'
    - '--token'
    - ${{ inputs.token }}
    - '--config'
    - ${{ inputs.config }}
    - '--output-dir'
    - ${{ inputs.output-dir }}
  env:
    GITHUB_TOKEN: ${{ inputs.token }}
