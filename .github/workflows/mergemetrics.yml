name: MergeMetrics Dashboard

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install MergeMetrics
        run: go install github.com/jbsommeling/merge-metrics/cmd/mergemetrics@latest

      - name: Generate dashboard
        run: mergemetrics generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push dashboard
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update MergeMetrics dashboard"
          file_pattern: "docs/* README.md"
